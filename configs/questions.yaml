# PyG HeterophilousGraphDataset — Questions（~49k 节点，>15000 走稀疏邻接）
dataset: questions
ae_dropout: 0.3
ae_lr: 0.01
ae_alpha: 0.8
hid_dim:
proto_alpha: 0.01
weight: 1.0
residual_scale: 10.0
sample_steps: 100
use_adaptive_residual_scale: false
use_multi_score_fusion: false
use_virtual_neighbors: false
use_score_smoothing: true
